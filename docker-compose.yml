version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ai_web_gen_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ai_web_gen
      MYSQL_USER: ai_web_gen
      MYSQL_PASSWORD: ai_web_gen123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_web_gen_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://ai_web_gen:ai_web_gen123@mysql:3306/ai_web_gen
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=ai_web_gen
      - DB_PASSWORD=ai_web_gen123
      - DB_NAME=ai_web_gen
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # Frontend
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: ai_web_gen_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data: